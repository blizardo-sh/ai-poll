<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Голосование</title>
  <style>
    :root{--bg:#f6f4ee;--card:#ffffff;--line:#e2ddd0;--ink:#171b22;--dim:#5d6673;
            --blue:#2049c7;--green:#187a52;
            --mono:'JetBrains Mono',ui-monospace,Consolas,monospace}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{min-height:100vh;background:var(--bg);color:var(--ink);
           font-family:'Inter',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;
           padding:22px 18px 40px}
    .top{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
           color:var(--blue);margin-bottom:26px}
    h1{font-size:23px;font-weight:800;line-height:1.3;margin-bottom:24px}
    .opts{display:flex;flex-direction:column;gap:12px}
    .opt{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px;
           font-size:17px;font-weight:600;cursor:pointer;color:var(--ink);text-align:left;
           box-shadow:0 1px 2px rgba(23,27,34,.05);transition:transform .12s,border-color .2s,background .2s}
    .opt:active{transform:scale(.975)}
    .opt.sel{border-color:var(--blue);background:#e8edfb;box-shadow:0 0 0 3px rgba(32,73,199,.12)}
    .state{margin:auto;text-align:center;color:var(--dim);font-size:16px;line-height:1.6;padding:40px 10px}
    .state .big{font-size:52px;margin-bottom:18px}
    .state b{color:var(--green)}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);
           animation:blink 1.2s ease-in-out infinite;margin:0 3px}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
    .foot{margin-top:auto;padding-top:30px;font-family:var(--mono);font-size:11px;color:#98a0ab;text-align:center}
    </style>
  </head>
  <body>
    <div class="top">ИИ для аудиторов · live</div>div>
    <div id="app"><div class="state"><span class="dot"></span>span><span class="dot"></span>span><span class="dot"></span>span><br><br>Подключаюсь…</div>div></div>div>
    <div class="foot">голос анонимный · один голос на вопрос</div>div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script>
      const app=document.getElementById('app');
      const cfg=window.POLL_CONFIG||{};
      const ok=cfg.firebase&&cfg.firebase.apiKey&&!String(cfg.firebase.apiKey).includes('ВСТАВЬ');

      function waiting(msg){app.innerHTML=`<div class="state"><div class="big">⏳</div>${msg}</div>`;}
      function thanks(){app.innerHTML=`<div class="state"><div class="big">✓</div><b>Голос принят.</b><br>Смотрите на экран — результат уже там.<br><br>Ждём следующий вопрос<span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;}

      if(!ok){
          waiting('Страница ещё не настроена.<br>Организатор: заполните vote/config.js<br>(см. README).');
      }else{
          firebase.initializeApp(cfg.firebase);
          const db=firebase.database();
          let currentId=null,lastPoll=null;

          // ведущий обнулил голоса: снимаем метки «уже голосовал» и рисуем вопрос заново
          db.ref('state/session').on('value',snap=>{
                const v=snap.val();if(v==null)return;
                const prev=localStorage.getItem('pollSession');
                if(String(v)!==prev){
                        localStorage.setItem('pollSession',String(v));
                        Object.keys(localStorage).filter(k=>k.indexOf('voted_')===0).forEach(k=>localStorage.removeItem(k));
                        currentId=null;
                        if(lastPoll){currentId=lastPoll.id;render(lastPoll);}
                }
          });

          db.ref('state/currentPoll').on('value',snap=>{
                const poll=snap.val();
                if(!poll||!poll.id){currentId=null;lastPoll=null;waiting('Голосование пока не открыто.<br>Ждём вопрос от ведущего…');return;}
                lastPoll=poll;
                if(poll.id===currentId)return;   // уже отрисован
                currentId=poll.id;
                if(localStorage.getItem('voted_'+poll.id)){thanks();return;}
                render(poll);
          });

          function render(poll){
                app.innerHTML=`<h1>${esc(poll.q)}</h1><div class="opts">`+
                        poll.options.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o)}</button>`).join('')+`</div>`;
                app.querySelectorAll('.opt').forEach(btn=>btn.addEventListener('click',()=>vote(poll.id,+btn.dataset.i,btn)));
          }
          function vote(id,i,btn){
                if(localStorage.getItem('voted_'+id))return;
                localStorage.setItem('voted_'+id,'1');
                btn.classList.add('sel');
                db.ref('polls/'+id+'/counts/'+i).transaction(v=>(v||0)+1)
                  .then(()=>setTimeout(thanks,450))
                  .catch(()=>{localStorage.removeItem('voted_'+id);btn.classList.remove('sel');});
          }
          function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
      }
    </script>
  </body>
</html>html>
    </script>
  </body>
